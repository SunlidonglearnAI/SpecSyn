default:
- override hydra/output: local
- override hydra/launcher: local
env: myoLegHillyTerrainWalkT2A-v0
algorithm: PPO
seed: 1
n_env: 32
n_eval_env: 5
policy: MlpPolicy
learning_rate: 3.0e-05
batch_size: 1024
gamma: 0.99
n_steps: 256
ent_coef: 0.01
clip_range: 0.2
gae_lambda: 0.95
total_timesteps: 50000000
log_interval: 1000
eval_freq: 1000000
restore_checkpoint_freq: 1000000
save_freq: 2000000
policy_kwargs:
  net_arch:
    pi:
    - 256
    - 256
    vf:
    - 256
    - 256
alg_hyper_params:
  device: cpu
job_name: ppo_sb3_${env}_evo
